<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoBot Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    body { background: #0a0e17; }
    .card { background: #111827; border: 1px solid #1f2937; }
    .log-line { font-family: 'JetBrains Mono', 'Fira Mono', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .log-INFO    { color: #94a3b8; }
    .log-WARNING { color: #f59e0b; }
    .log-ERROR   { color: #ef4444; }
    .log-buy     { color: #22c55e; }
    .log-sell    { color: #f43f5e; }
    .log-cross   { color: #38bdf8; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot-red    { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .dot-yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }
  </style>
</head>
<body class="text-gray-100 min-h-screen">

  <!-- Header -->
  <div class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/>
      </svg>
      <span class="text-lg font-semibold tracking-tight">AlgoBot</span>
      <span class="text-gray-600 text-sm">/ 5 strategies</span>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <div class="flex items-center gap-2">
        <span class="dot dot-green" id="ws-dot"></span>
        <span class="text-gray-400" id="ws-status">connecting…</span>
      </div>
      <span class="text-gray-600" id="clock"></span>
    </div>
  </div>

  <div class="p-6 flex flex-col gap-4">

    <!-- Stat cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="card rounded-xl p-4">
        <div class="text-xs text-gray-500 uppercase tracking-widest">Equity</div>
        <div class="text-2xl font-bold mt-1" id="equity">—</div>
      </div>
      <div class="card rounded-xl p-4">
        <div class="text-xs text-gray-500 uppercase tracking-widest">Day P&amp;L</div>
        <div class="text-2xl font-bold mt-1" id="day-pnl">—</div>
      </div>
      <div class="card rounded-xl p-4">
        <div class="text-xs text-gray-500 uppercase tracking-widest">Buying Power</div>
        <div class="text-2xl font-bold mt-1" id="buying-power">—</div>
      </div>
      <div class="card rounded-xl p-4">
        <div class="text-xs text-gray-500 uppercase tracking-widest">Open Positions</div>
        <div class="text-2xl font-bold mt-1" id="pos-count">—</div>
      </div>
      <div class="card rounded-xl p-4">
        <div class="text-xs text-gray-500 uppercase tracking-widest">Mode</div>
        <div class="text-2xl font-bold mt-1 text-yellow-400" id="acct-mode">—</div>
      </div>
    </div>

    <!-- Strategy cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-5 gap-4" id="strategy-cards"></div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="charts-grid"></div>

    <!-- Positions + Log -->
    <div class="grid grid-cols-12 gap-4">
      <div class="col-span-12 lg:col-span-4 card rounded-xl p-5">
        <div class="text-xs text-gray-500 uppercase tracking-widest mb-3">Open Positions</div>
        <div id="positions-body"><div class="text-gray-600 text-sm">Loading…</div></div>
      </div>
      <div class="col-span-12 lg:col-span-8 card rounded-xl flex flex-col" style="height: 420px">
        <div class="flex items-center justify-between px-5 py-3 border-b border-gray-800">
          <div class="text-xs text-gray-500 uppercase tracking-widest">Live Log</div>
          <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
              <input type="checkbox" id="autoscroll" checked class="accent-blue-500" /> Auto-scroll
            </label>
            <select id="log-filter" class="text-xs bg-gray-800 border border-gray-700 text-gray-300 rounded px-2 py-1">
              <option value="ALL">All</option>
              <option value="ORDER">Orders only</option>
              <option value="ERROR">Errors only</option>
            </select>
            <button onclick="clearLogs()" class="text-xs text-gray-500 hover:text-gray-300 transition">Clear</button>
          </div>
        </div>
        <div id="log-container" class="flex-1 overflow-y-auto px-5 py-3 flex flex-col gap-0.5"></div>
      </div>
    </div>

  </div>

<script>
  // ── Strategy metadata (mirrors config.yaml) ───────────────────────────────
  const STRATEGIES = [
    { name: 'ma_crossover_SPY',       symbol: 'SPY',  type: 'Trend — EMA 12/21',       overlay: 'ema'  },
    { name: 'rsi_mean_reversion_AAPL',symbol: 'AAPL', type: 'RSI Mean Reversion',      overlay: null   },
    { name: 'bollinger_reversion_QQQ',symbol: 'QQQ',  type: 'Bollinger Reversion',     overlay: 'bb'   },
    { name: 'news_sentiment_TSLA',    symbol: 'TSLA', type: 'News Sentiment (VADER)',  overlay: null   },
    { name: 'volume_exhaustion_NVDA', symbol: 'NVDA', type: 'Volume Exhaustion',       overlay: 'vol'  },
  ];

  // ── Clock ────────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-US', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Strategy cards ───────────────────────────────────────────────────────
  const strategyState = {};
  STRATEGIES.forEach(s => strategyState[s.name] = { ...s, lastSignal: 'waiting for signals…', lastTime: '—' });

  function renderStrategies() {
    document.getElementById('strategy-cards').innerHTML = STRATEGIES.map(meta => {
      const s = strategyState[meta.name];
      return `
      <div class="card rounded-xl p-4">
        <div class="flex items-center justify-between mb-1">
          <span class="text-blue-400 font-semibold">${meta.symbol}</span>
          <span class="dot dot-green"></span>
        </div>
        <div class="text-xs text-gray-500 mb-2">${meta.type}</div>
        <div class="text-gray-300 text-xs truncate" title="${s.lastSignal}">${s.lastSignal}</div>
        <div class="text-gray-600 text-xs mt-1">${s.lastTime}</div>
      </div>`;
    }).join('');
  }
  renderStrategies();

  function parseStrategiesFromLog(line) {
    const m = line.match(/bot\.strategies\.\w+:\s+\[([^\]]+)\]\s+(.*)/);
    if (!m) return;
    const [, name, msg] = m;
    if (!strategyState[name]) return;
    if (/buy|sell|crossover|oversold|overbought|band|capitulation|news|headline|stop/i.test(msg)) {
      strategyState[name].lastSignal = msg.length > 70 ? msg.slice(0, 70) + '…' : msg;
      strategyState[name].lastTime   = new Date().toLocaleTimeString('en-US', { hour12: false });
      renderStrategies();
    }
  }

  // ── Log stream ───────────────────────────────────────────────────────────
  const logContainer = document.getElementById('log-container');
  const MAX_LINES = 2000;
  let allLines = [];

  function classifyLine(text) {
    if (/buying|bought|bullish|buy/i.test(text))  return 'log-buy';
    if (/selling|sold|bearish|sell/i.test(text))  return 'log-sell';
    if (/crossover|band|capitulation/i.test(text)) return 'log-cross';
    if (/ERROR/.test(text))   return 'log-ERROR';
    if (/WARNING/.test(text)) return 'log-WARNING';
    return 'log-INFO';
  }

  function matchesFilter(text, filter) {
    if (filter === 'ALL') return true;
    if (filter === 'ORDER') return /buy|sell|order|submit/i.test(text);
    if (filter === 'ERROR') return /error|warning/i.test(text);
    return true;
  }

  function renderLines() {
    const filter = document.getElementById('log-filter').value;
    logContainer.innerHTML = '';
    allLines.filter(l => matchesFilter(l, filter)).forEach(text => {
      const el = document.createElement('div');
      el.className = 'log-line ' + classifyLine(text);
      el.textContent = text;
      logContainer.appendChild(el);
    });
    if (document.getElementById('autoscroll').checked)
      logContainer.scrollTop = logContainer.scrollHeight;
  }

  function appendLine(text) {
    allLines.push(text);
    if (allLines.length > MAX_LINES) allLines.shift();
    parseStrategiesFromLog(text);
    const filter = document.getElementById('log-filter').value;
    if (!matchesFilter(text, filter)) return;
    const el = document.createElement('div');
    el.className = 'log-line ' + classifyLine(text);
    el.textContent = text;
    logContainer.appendChild(el);
    while (logContainer.children.length > MAX_LINES)
      logContainer.removeChild(logContainer.firstChild);
    if (document.getElementById('autoscroll').checked)
      logContainer.scrollTop = logContainer.scrollHeight;
  }

  function clearLogs() { allLines = []; logContainer.innerHTML = ''; }
  document.getElementById('log-filter').addEventListener('change', renderLines);

  const proto  = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl  = `${proto}://${location.host}/ws/logs`;
  const wsDot  = document.getElementById('ws-dot');
  const wsStat = document.getElementById('ws-status');

  function connectLogWs() {
    const ws = new WebSocket(wsUrl);
    ws.onopen    = () => { wsDot.className = 'dot dot-green';  wsStat.textContent = 'live'; };
    ws.onmessage = e  => appendLine(e.data);
    ws.onclose   = () => { wsDot.className = 'dot dot-yellow'; wsStat.textContent = 'reconnecting…';
                           setTimeout(connectLogWs, 3000); };
    ws.onerror   = () => { wsDot.className = 'dot dot-red';    wsStat.textContent = 'error'; };
  }
  connectLogWs();

  // ── Account + Positions ──────────────────────────────────────────────────
  function fmt(n) {
    if (n == null || n === '') return '—';
    const v = parseFloat(n);
    return isNaN(v) ? n : '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtPnl(n) {
    if (n == null || n === '') return '—';
    const v = parseFloat(n);
    if (isNaN(v)) return n;
    const s = (v >= 0 ? '+' : '-') + '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return `<span class="${v >= 0 ? 'text-green-400' : 'text-red-400'}">${s}</span>`;
  }

  async function pollAccount() {
    try {
      const resp = await (await fetch('/api/account')).json();
      const d = resp.data ?? resp;
      document.getElementById('equity').textContent       = fmt(d.equity);
      document.getElementById('buying-power').textContent = fmt(d.buying_power ?? d.daytrading_buying_power);
      const pnl = d.last_equity ? (parseFloat(d.equity) - parseFloat(d.last_equity)).toFixed(2) : null;
      document.getElementById('day-pnl').innerHTML        = fmtPnl(pnl);
      document.getElementById('acct-mode').textContent    = d.account_number?.startsWith('PA') ? 'Paper' : 'Live';
    } catch {}
  }

  async function pollPositions() {
    try {
      const resp = await (await fetch('/api/positions')).json();
      const raw  = resp.data ?? resp;
      const positions = Array.isArray(raw) ? raw : (raw.positions ?? []);
      document.getElementById('pos-count').textContent = positions.length;
      const el = document.getElementById('positions-body');
      if (!positions.length) {
        el.innerHTML = '<div class="text-gray-600 text-sm">No open positions</div>';
        return;
      }
      el.innerHTML = `
        <table class="w-full text-xs">
          <thead>
            <tr class="text-gray-500 border-b border-gray-800">
              <th class="text-left pb-2">Symbol</th><th class="text-right pb-2">Qty</th>
              <th class="text-right pb-2">Avg</th><th class="text-right pb-2">P&amp;L</th>
            </tr>
          </thead>
          <tbody>
            ${positions.map(p => `
              <tr class="border-b border-gray-800 last:border-0">
                <td class="py-2 text-blue-400 font-medium">${p.symbol}</td>
                <td class="py-2 text-right text-gray-300">${p.qty}</td>
                <td class="py-2 text-right text-gray-300">${fmt(p.avg_entry_price ?? p.avg_cost)}</td>
                <td class="py-2 text-right">${fmtPnl(p.unrealized_pl)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch {}
  }

  pollAccount(); pollPositions();
  setInterval(pollAccount,   15000);
  setInterval(pollPositions, 15000);

  // ── Charts ───────────────────────────────────────────────────────────────
  const chartInstances = {};

  // Build a chart panel per strategy
  document.getElementById('charts-grid').innerHTML = STRATEGIES.map(s => `
    <div class="card rounded-xl p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="text-xs text-gray-500 uppercase tracking-widest">${s.symbol} — ${s.type}</div>
        <select id="tf-${s.symbol}" onchange="loadChart('${s.symbol}','${s.overlay ?? ''}')"
          class="text-xs bg-gray-800 border border-gray-700 text-gray-300 rounded px-2 py-1">
          <option value="1m">1 Min</option>
          <option value="5m" selected>5 Min</option>
          <option value="15m">15 Min</option>
        </select>
      </div>
      <div style="position:relative;height:240px"><canvas id="chart-${s.symbol}"></canvas></div>
    </div>`).join('');

  function chartOptions() {
    return {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: '#94a3b8', boxWidth: 10, font: { size: 11 } } },
        tooltip: { backgroundColor: '#1f2937', titleColor: '#94a3b8', bodyColor: '#e2e8f0',
                   borderColor: '#374151', borderWidth: 1 },
      },
      scales: {
        x: { type: 'time', time: { tooltipFormat: 'MMM d HH:mm' },
             ticks: { color: '#4b5563', maxTicksLimit: 8, font: { size: 10 } },
             grid: { color: '#1f2937' } },
        y: { position: 'right',
             ticks: { color: '#4b5563', font: { size: 10 }, callback: v => '$' + v.toFixed(2) },
             grid: { color: '#1f2937' } },
      },
    };
  }

  function ema(data, period) {
    const k = 2 / (period + 1), out = [];
    let prev = null;
    for (const v of data) {
      if (prev === null) { out.push(v); prev = v; }
      else { const e = v * k + prev * (1 - k); out.push(e); prev = e; }
    }
    return out;
  }

  function rollingBB(data, period, ndev) {
    const mid = [], upper = [], lower = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) { mid.push(null); upper.push(null); lower.push(null); continue; }
      const win = data.slice(i - period + 1, i + 1);
      const m = win.reduce((a,b) => a+b, 0) / period;
      const sd = Math.sqrt(win.reduce((a,b) => a + (b-m)**2, 0) / (period - 1));
      mid.push(m); upper.push(m + ndev*sd); lower.push(m - ndev*sd);
    }
    return { mid, upper, lower };
  }

  async function loadChart(symbol, overlay) {
    const tf = document.getElementById(`tf-${symbol}`).value;
    try {
      const data = await (await fetch(`/api/chart/${symbol}?timeframe=${tf}&bars=200`)).json();
      renderChart(symbol, overlay, data.bars, data.signals);
    } catch(e) { console.warn('Chart load failed:', symbol, e); }
  }

  function renderChart(symbol, overlay, bars, signals) {
    if (!bars || !bars.length) return;
    const labels = bars.map(b => new Date(b.t));
    const closes = bars.map(b => b.c);

    const datasets = [{
      label: symbol, type: 'line',
      data: labels.map((t, i) => ({ x: t, y: closes[i] })),
      borderColor: '#38bdf8', borderWidth: 1.5, pointRadius: 0, tension: 0.1, fill: false, order: 3,
    }];

    if (overlay === 'ema') {
      const fast = ema(closes, 12), slow = ema(closes, 21);
      datasets.push(
        { label: 'EMA 12', type: 'line', data: labels.map((t,i) => ({ x: t, y: +fast[i].toFixed(3) })),
          borderColor: '#a78bfa', borderWidth: 1.5, pointRadius: 0, borderDash: [4,4], fill: false, order: 4 },
        { label: 'EMA 21', type: 'line', data: labels.map((t,i) => ({ x: t, y: +slow[i].toFixed(3) })),
          borderColor: '#fb923c', borderWidth: 1.5, pointRadius: 0, borderDash: [4,4], fill: false, order: 4 });
    } else if (overlay === 'bb') {
      const bb = rollingBB(closes, 20, 2.0);
      const mk = (arr, label, color) => ({
        label, type: 'line',
        data: labels.map((t,i) => arr[i] == null ? null : ({ x: t, y: +arr[i].toFixed(3) })).filter(Boolean),
        borderColor: color, borderWidth: 1, pointRadius: 0, borderDash: [4,4], fill: false, order: 4 });
      datasets.push(mk(bb.upper, 'BB upper', '#64748b'),
                    mk(bb.mid,   'BB mid',   '#a78bfa'),
                    mk(bb.lower, 'BB lower', '#64748b'));
    }

    // Buy / sell markers snapped to the nearest bar
    const buys = [], sells = [];
    for (const sig of (signals || [])) {
      const st = new Date(sig.t).getTime();
      let ci = null, md = Infinity;
      for (let i = 0; i < labels.length; i++) {
        const d = Math.abs(labels[i].getTime() - st);
        if (d < md) { md = d; ci = i; }
      }
      if (ci !== null && md < 10 * 60 * 1000) {
        const pt = { x: labels[ci], y: closes[ci] };
        (sig.side === 'buy' ? buys : sells).push(pt);
      }
    }
    datasets.push(
      { label: 'Buy', data: buys, type: 'scatter', pointStyle: 'triangle',
        pointRadius: 8, pointHoverRadius: 10, backgroundColor: '#22c55e', borderColor: '#22c55e', order: 1 },
      { label: 'Sell', data: sells, type: 'scatter', pointStyle: 'triangle', pointRotation: 180,
        pointRadius: 8, pointHoverRadius: 10, backgroundColor: '#f43f5e', borderColor: '#f43f5e', order: 2 });

    if (chartInstances[symbol]) chartInstances[symbol].destroy();
    const ctx = document.getElementById(`chart-${symbol}`).getContext('2d');
    chartInstances[symbol] = new Chart(ctx, { type: 'line', data: { datasets }, options: chartOptions() });
  }

  function loadAllCharts() {
    STRATEGIES.forEach(s => loadChart(s.symbol, s.overlay ?? ''));
  }
  loadAllCharts();
  setInterval(loadAllCharts, 120_000);
</script>
</body>
</html>
