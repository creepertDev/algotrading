<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALGOBOT TERMINAL</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg:      #000000;
      --panel:   #0a0a0a;
      --border:  #2a2a2a;
      --amber:   #fb8b1e;
      --amber2:  #ffb347;
      --white:   #e8e8e8;
      --dim:     #7a7a7a;
      --green:   #00c853;
      --red:     #ff3d3d;
      --cyan:    #4dd0e1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; }

    /* ── Top bar ── */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--amber); color: #000;
      padding: 4px 12px; font-weight: 700; letter-spacing: 0.5px;
    }
    .topbar .right { display: flex; gap: 16px; font-weight: 400; }

    .statusbar {
      display: flex; gap: 24px; align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 4px 12px; color: var(--dim); font-size: 11px;
    }
    .statusbar b { color: var(--amber); font-weight: 400; }

    /* ── Layout ── */
    .wrap { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
    .row  { display: grid; gap: 8px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .panel-hd {
      display: flex; justify-content: space-between; align-items: center;
      background: #141414;
      border-bottom: 1px solid var(--border);
      padding: 3px 10px;
      color: var(--amber); font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .panel-bd { padding: 8px 10px; }

    /* ── Stats ── */
    .stats { grid-template-columns: repeat(5, 1fr); }
    .stat .lbl { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .stat .val { font-size: 18px; margin-top: 2px; color: var(--amber2); }

    /* ── Strategy grid ── */
    .strats { grid-template-columns: repeat(5, 1fr); }
    .strat .sym  { color: var(--amber); font-weight: 700; font-size: 13px; }
    .strat .type { color: var(--cyan); font-size: 10px; text-transform: uppercase; }
    .strat .sig  { color: var(--white); font-size: 11px; margin-top: 4px;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .strat .tm   { color: var(--dim); font-size: 10px; }
    .live-dot { display:inline-block; width:6px; height:6px; background: var(--green); }

    /* ── Charts ── */
    .charts { grid-template-columns: repeat(2, 1fr); }
    .chart-box { position: relative; height: 230px; }
    select {
      background: #000; color: var(--amber); border: 1px solid var(--border);
      font-family: inherit; font-size: 10px; padding: 1px 4px;
    }
    select:focus { outline: 1px solid var(--amber); }

    /* ── Positions table ── */
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { color: var(--dim); text-align: right; font-weight: 400;
         text-transform: uppercase; font-size: 10px; letter-spacing: 1px;
         border-bottom: 1px solid var(--border); padding: 2px 6px; }
    th:first-child, td:first-child { text-align: left; }
    td { text-align: right; padding: 3px 6px; border-bottom: 1px solid #161616; }
    td.sym { color: var(--amber); font-weight: 700; }
    .up   { color: var(--green); }
    .down { color: var(--red); }

    /* ── Log ── */
    .logwrap { height: 380px; overflow-y: auto; padding: 6px 10px; }
    .log-line { font-size: 11px; white-space: pre-wrap; word-break: break-all; }
    .log-INFO    { color: #9a9a9a; }
    .log-WARNING { color: var(--amber2); }
    .log-ERROR   { color: var(--red); }
    .log-buy     { color: var(--green); }
    .log-sell    { color: var(--red); }
    .log-cross   { color: var(--cyan); }
    label { color: var(--dim); font-size: 10px; text-transform: uppercase; cursor: pointer; }
    input[type=checkbox] { accent-color: var(--amber); }
    button {
      background: none; border: 1px solid var(--border); color: var(--dim);
      font-family: inherit; font-size: 10px; padding: 1px 8px; cursor: pointer;
      text-transform: uppercase;
    }
    button:hover { color: var(--amber); border-color: var(--amber); }

    .grid-2col { grid-template-columns: 1fr 2fr; }
    @media (max-width: 1100px) {
      .stats, .strats, .charts { grid-template-columns: repeat(2, 1fr); }
      .grid-2col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Amber command bar -->
  <div class="topbar">
    <span>ALGOBOT&nbsp;&lt;TERMINAL&gt;</span>
    <div class="right">
      <span id="clock-et">—</span>
      <span id="clock-local">—</span>
    </div>
  </div>

  <div class="statusbar">
    <span>CONN <b id="ws-status">CONNECTING…</b></span>
    <span>MODE <b id="acct-mode">—</b></span>
    <span>FEED <b>ALPACA IEX WS</b></span>
    <span>EXEC <b>CPP-WS:8765</b></span>
    <span>STRATS <b>5 ACTIVE</b></span>
  </div>

  <div class="wrap">

    <!-- 1) ACCOUNT -->
    <div class="row stats">
      <div class="panel"><div class="panel-hd">Equity</div>
        <div class="panel-bd stat"><div class="val" id="equity">—</div></div></div>
      <div class="panel"><div class="panel-hd">Day P&amp;L</div>
        <div class="panel-bd stat"><div class="val" id="day-pnl">—</div></div></div>
      <div class="panel"><div class="panel-hd">Buying Power</div>
        <div class="panel-bd stat"><div class="val" id="buying-power">—</div></div></div>
      <div class="panel"><div class="panel-hd">Open Pos</div>
        <div class="panel-bd stat"><div class="val" id="pos-count">—</div></div></div>
      <div class="panel"><div class="panel-hd">Session</div>
        <div class="panel-bd stat"><div class="val" id="mkt-status">—</div></div></div>
    </div>

    <!-- 2) STRATEGIES -->
    <div class="row strats" id="strategy-cards"></div>

    <!-- 3) CHARTS -->
    <div class="row charts" id="charts-grid"></div>

    <!-- 4) POSITIONS + MONITOR -->
    <div class="row grid-2col">
      <div class="panel">
        <div class="panel-hd">Positions</div>
        <div class="panel-bd" id="positions-body"><span style="color:var(--dim)">LOADING…</span></div>
      </div>
      <div class="panel">
        <div class="panel-hd">
          <span>Event Monitor</span>
          <span style="display:flex;gap:10px;align-items:center;font-weight:400">
            <label><input type="checkbox" id="autoscroll" checked /> SCROLL</label>
            <select id="log-filter">
              <option value="ALL">ALL</option>
              <option value="ORDER">ORDERS</option>
              <option value="ERROR">ERR/WARN</option>
            </select>
            <button onclick="clearLogs()">CLR</button>
          </span>
        </div>
        <div class="logwrap" id="log-container"></div>
      </div>
    </div>

  </div>

<script>
  // ── Strategy metadata (mirrors config.yaml) ───────────────────────────────
  const STRATEGIES = [
    { name: 'ma_crossover_SPY',        symbol: 'SPY',  type: 'EMA 12/21 TREND',   overlay: 'ema' },
    { name: 'rsi_mean_reversion_AAPL', symbol: 'AAPL', type: 'RSI MEAN-REV',      overlay: null  },
    { name: 'bollinger_reversion_QQQ', symbol: 'QQQ',  type: 'BOLL BAND REV',     overlay: 'bb'  },
    { name: 'news_sentiment_TSLA',     symbol: 'TSLA', type: 'NEWS SENTIMENT',    overlay: null  },
    { name: 'volume_exhaustion_NVDA',  symbol: 'NVDA', type: 'VOL EXHAUSTION',    overlay: null  },
  ];

  // ── Clocks + market session ───────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const et  = now.toLocaleTimeString('en-US', { hour12: false, timeZone: 'America/New_York' });
    document.getElementById('clock-et').textContent    = `NY ${et}`;
    document.getElementById('clock-local').textContent = `LOC ${now.toLocaleTimeString('en-US', { hour12: false })}`;
    const [h, m] = et.split(':').map(Number);
    const mins = h * 60 + m;
    const day  = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' })).getDay();
    const open = day >= 1 && day <= 5 && mins >= 570 && mins < 960;
    const el = document.getElementById('mkt-status');
    el.textContent = open ? 'OPEN' : 'CLOSED';
    el.style.color = open ? 'var(--green)' : 'var(--red)';
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Strategy cards ────────────────────────────────────────────────────────
  const strategyState = {};
  STRATEGIES.forEach(s => strategyState[s.name] = { lastSignal: 'AWAITING SIGNAL', lastTime: '—' });

  function renderStrategies() {
    document.getElementById('strategy-cards').innerHTML = STRATEGIES.map(meta => {
      const s = strategyState[meta.name];
      return `
      <div class="panel strat">
        <div class="panel-hd"><span>${meta.symbol}</span><span class="live-dot"></span></div>
        <div class="panel-bd">
          <div class="type">${meta.type}</div>
          <div class="sig" title="${s.lastSignal}">${s.lastSignal}</div>
          <div class="tm">${s.lastTime}</div>
        </div>
      </div>`;
    }).join('');
  }
  renderStrategies();

  function parseStrategiesFromLog(line) {
    const m = line.match(/bot\.strategies\.\w+:\s+\[([^\]]+)\]\s+(.*)/);
    if (!m) return;
    const [, name, msg] = m;
    if (!strategyState[name]) return;
    if (/buy|sell|crossover|oversold|overbought|band|capitulation|news|headline|stop/i.test(msg)) {
      strategyState[name].lastSignal = msg.length > 60 ? msg.slice(0, 60) + '…' : msg;
      strategyState[name].lastTime   = new Date().toLocaleTimeString('en-US', { hour12: false });
      renderStrategies();
    }
  }

  // ── Event monitor ─────────────────────────────────────────────────────────
  const logContainer = document.getElementById('log-container');
  const MAX_LINES = 2000;
  let allLines = [];

  function classifyLine(t) {
    if (/buying|bought|bullish|buy/i.test(t))   return 'log-buy';
    if (/selling|sold|bearish|sell/i.test(t))   return 'log-sell';
    if (/crossover|band|capitulation/i.test(t)) return 'log-cross';
    if (/ERROR/.test(t))   return 'log-ERROR';
    if (/WARNING/.test(t)) return 'log-WARNING';
    return 'log-INFO';
  }
  function matchesFilter(t, f) {
    if (f === 'ALL') return true;
    if (f === 'ORDER') return /buy|sell|order|submit/i.test(t);
    if (f === 'ERROR') return /error|warning/i.test(t);
    return true;
  }
  function renderLines() {
    const f = document.getElementById('log-filter').value;
    logContainer.innerHTML = '';
    allLines.filter(l => matchesFilter(l, f)).forEach(text => {
      const el = document.createElement('div');
      el.className = 'log-line ' + classifyLine(text);
      el.textContent = text;
      logContainer.appendChild(el);
    });
    if (document.getElementById('autoscroll').checked)
      logContainer.scrollTop = logContainer.scrollHeight;
  }
  function appendLine(text) {
    allLines.push(text);
    if (allLines.length > MAX_LINES) allLines.shift();
    parseStrategiesFromLog(text);
    const f = document.getElementById('log-filter').value;
    if (!matchesFilter(text, f)) return;
    const el = document.createElement('div');
    el.className = 'log-line ' + classifyLine(text);
    el.textContent = text;
    logContainer.appendChild(el);
    while (logContainer.children.length > MAX_LINES)
      logContainer.removeChild(logContainer.firstChild);
    if (document.getElementById('autoscroll').checked)
      logContainer.scrollTop = logContainer.scrollHeight;
  }
  function clearLogs() { allLines = []; logContainer.innerHTML = ''; }
  document.getElementById('log-filter').addEventListener('change', renderLines);

  const proto  = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsStat = document.getElementById('ws-status');
  function connectLogWs() {
    const ws = new WebSocket(`${proto}://${location.host}/ws/logs`);
    ws.onopen    = () => { wsStat.textContent = 'LIVE';  wsStat.style.color = 'var(--green)'; };
    ws.onmessage = e  => appendLine(e.data);
    ws.onclose   = () => { wsStat.textContent = 'RECONNECTING…'; wsStat.style.color = 'var(--amber2)';
                           setTimeout(connectLogWs, 3000); };
    ws.onerror   = () => { wsStat.textContent = 'ERROR'; wsStat.style.color = 'var(--red)'; };
  }
  connectLogWs();

  // ── Account + positions ───────────────────────────────────────────────────
  const fmt = n => {
    if (n == null || n === '') return '—';
    const v = parseFloat(n);
    return isNaN(v) ? n : v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };
  const fmtPnl = n => {
    if (n == null || n === '') return '—';
    const v = parseFloat(n);
    if (isNaN(v)) return n;
    const s = (v >= 0 ? '+' : '-') + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return `<span class="${v >= 0 ? 'up' : 'down'}">${s}</span>`;
  };

  async function pollAccount() {
    try {
      const resp = await (await fetch('/api/account')).json();
      const d = resp.data ?? resp;
      document.getElementById('equity').textContent       = fmt(d.equity);
      document.getElementById('buying-power').textContent = fmt(d.buying_power ?? d.daytrading_buying_power);
      const pnl = d.last_equity ? (parseFloat(d.equity) - parseFloat(d.last_equity)).toFixed(2) : null;
      document.getElementById('day-pnl').innerHTML        = fmtPnl(pnl);
      document.getElementById('acct-mode').textContent    = d.account_number?.startsWith('PA') ? 'PAPER' : 'LIVE';
    } catch {}
  }

  async function pollPositions() {
    try {
      const resp = await (await fetch('/api/positions')).json();
      const raw  = resp.data ?? resp;
      const positions = Array.isArray(raw) ? raw : (raw.positions ?? []);
      document.getElementById('pos-count').textContent = positions.length;
      const el = document.getElementById('positions-body');
      if (!positions.length) {
        el.innerHTML = '<span style="color:var(--dim)">NO OPEN POSITIONS</span>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>SYM</th><th>QTY</th><th>AVG</th><th>LAST</th><th>P&amp;L</th></tr></thead>
          <tbody>
            ${positions.map(p => `
              <tr>
                <td class="sym">${p.symbol}</td>
                <td>${p.qty}</td>
                <td>${fmt(p.avg_entry_price ?? p.avg_cost)}</td>
                <td>${fmt(p.current_price)}</td>
                <td>${fmtPnl(p.unrealized_pl)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch {}
  }

  pollAccount(); pollPositions();
  setInterval(pollAccount,   15000);
  setInterval(pollPositions, 15000);

  // ── Charts ────────────────────────────────────────────────────────────────
  const chartInstances = {};

  document.getElementById('charts-grid').innerHTML = STRATEGIES.map(s => `
    <div class="panel">
      <div class="panel-hd">
        <span>${s.symbol} · ${s.type}</span>
        <select id="tf-${s.symbol}" onchange="loadChart('${s.symbol}','${s.overlay ?? ''}')">
          <option value="1m">1M</option>
          <option value="5m" selected>5M</option>
          <option value="15m">15M</option>
        </select>
      </div>
      <div class="panel-bd chart-box"><canvas id="chart-${s.symbol}"></canvas></div>
    </div>`).join('');

  function chartOptions() {
    return {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: '#7a7a7a', boxWidth: 8,
                  font: { size: 10, family: "'IBM Plex Mono', monospace" } } },
        tooltip: { backgroundColor: '#141414', titleColor: '#fb8b1e', bodyColor: '#e8e8e8',
                   borderColor: '#2a2a2a', borderWidth: 1,
                   titleFont: { family: "'IBM Plex Mono', monospace" },
                   bodyFont:  { family: "'IBM Plex Mono', monospace" } },
      },
      scales: {
        x: { type: 'time', time: { tooltipFormat: 'MMM d HH:mm' },
             ticks: { color: '#5a5a5a', maxTicksLimit: 8,
                      font: { size: 9, family: "'IBM Plex Mono', monospace" } },
             grid: { color: '#1a1a1a' } },
        y: { position: 'right',
             ticks: { color: '#5a5a5a', font: { size: 9, family: "'IBM Plex Mono', monospace" },
                      callback: v => v.toFixed(2) },
             grid: { color: '#1a1a1a' } },
      },
    };
  }

  function ema(data, period) {
    const k = 2 / (period + 1), out = [];
    let prev = null;
    for (const v of data) {
      if (prev === null) { out.push(v); prev = v; }
      else { const e = v * k + prev * (1 - k); out.push(e); prev = e; }
    }
    return out;
  }

  function rollingBB(data, period, ndev) {
    const mid = [], upper = [], lower = [];
    for (let i = 0; i < data.length; i++) {
      if (i < period - 1) { mid.push(null); upper.push(null); lower.push(null); continue; }
      const win = data.slice(i - period + 1, i + 1);
      const m = win.reduce((a,b) => a+b, 0) / period;
      const sd = Math.sqrt(win.reduce((a,b) => a + (b-m)**2, 0) / (period - 1));
      mid.push(m); upper.push(m + ndev*sd); lower.push(m - ndev*sd);
    }
    return { mid, upper, lower };
  }

  async function loadChart(symbol, overlay) {
    const tf = document.getElementById(`tf-${symbol}`).value;
    try {
      const data = await (await fetch(`/api/chart/${symbol}?timeframe=${tf}&bars=200`)).json();
      renderChart(symbol, overlay, data.bars, data.signals);
    } catch(e) { console.warn('Chart load failed:', symbol, e); }
  }

  function renderChart(symbol, overlay, bars, signals) {
    if (!bars || !bars.length) return;
    const labels = bars.map(b => new Date(b.t));
    const closes = bars.map(b => b.c);

    const datasets = [{
      label: symbol, type: 'line',
      data: labels.map((t, i) => ({ x: t, y: closes[i] })),
      borderColor: '#fb8b1e', borderWidth: 1.5, pointRadius: 0, tension: 0, fill: false, order: 3,
    }];

    if (overlay === 'ema') {
      const fast = ema(closes, 12), slow = ema(closes, 21);
      datasets.push(
        { label: 'EMA12', type: 'line', data: labels.map((t,i) => ({ x: t, y: +fast[i].toFixed(3) })),
          borderColor: '#4dd0e1', borderWidth: 1, pointRadius: 0, borderDash: [4,4], fill: false, order: 4 },
        { label: 'EMA21', type: 'line', data: labels.map((t,i) => ({ x: t, y: +slow[i].toFixed(3) })),
          borderColor: '#ab47bc', borderWidth: 1, pointRadius: 0, borderDash: [4,4], fill: false, order: 4 });
    } else if (overlay === 'bb') {
      const bb = rollingBB(closes, 20, 2.0);
      const mk = (arr, label, color) => ({
        label, type: 'line',
        data: labels.map((t,i) => arr[i] == null ? null : ({ x: t, y: +arr[i].toFixed(3) })).filter(Boolean),
        borderColor: color, borderWidth: 1, pointRadius: 0, borderDash: [4,4], fill: false, order: 4 });
      datasets.push(mk(bb.upper, 'BB+', '#5a5a5a'),
                    mk(bb.mid,   'MID', '#4dd0e1'),
                    mk(bb.lower, 'BB-', '#5a5a5a'));
    }

    const buys = [], sells = [];
    for (const sig of (signals || [])) {
      const st = new Date(sig.t).getTime();
      let ci = null, md = Infinity;
      for (let i = 0; i < labels.length; i++) {
        const d = Math.abs(labels[i].getTime() - st);
        if (d < md) { md = d; ci = i; }
      }
      if (ci !== null && md < 10 * 60 * 1000) {
        const pt = { x: labels[ci], y: closes[ci] };
        (sig.side === 'buy' ? buys : sells).push(pt);
      }
    }
    datasets.push(
      { label: 'BUY', data: buys, type: 'scatter', pointStyle: 'triangle',
        pointRadius: 7, pointHoverRadius: 9, backgroundColor: '#00c853', borderColor: '#00c853', order: 1 },
      { label: 'SELL', data: sells, type: 'scatter', pointStyle: 'triangle', pointRotation: 180,
        pointRadius: 7, pointHoverRadius: 9, backgroundColor: '#ff3d3d', borderColor: '#ff3d3d', order: 2 });

    if (chartInstances[symbol]) chartInstances[symbol].destroy();
    const ctx = document.getElementById(`chart-${symbol}`).getContext('2d');
    chartInstances[symbol] = new Chart(ctx, { type: 'line', data: { datasets }, options: chartOptions() });
  }

  function loadAllCharts() {
    STRATEGIES.forEach(s => loadChart(s.symbol, s.overlay ?? ''));
  }
  loadAllCharts();
  setInterval(loadAllCharts, 120_000);
</script>
</body>
</html>
